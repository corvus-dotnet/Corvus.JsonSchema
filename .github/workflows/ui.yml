name: ui-kit

# Tests for the Arazzo Control Plane web-component kit. Decoupled from the .NET build (build.yml): runs only
# when the kit or the contract it targets changes, so the NuGet pipeline is never entangled with JS failures.
on:
  push:
    branches: [main]
    paths:
      - 'web/arazzo-control-plane-ui/**'
      - 'docs/control-plane/arazzo-control-plane.openapi.json'
      - '.github/workflows/ui.yml'
  pull_request:
    paths:
      - 'web/arazzo-control-plane-ui/**'
      - 'docs/control-plane/arazzo-control-plane.openapi.json'
      - '.github/workflows/ui.yml'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: web/arazzo-control-plane-ui

jobs:
  test:
    name: kit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/arazzo-control-plane-ui/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Tiers 1+2 — client behaviour + OpenAPI conformance (no browser)
        run: npm test
      - name: Install Chromium for browser tests
        run: npx playwright install --with-deps chromium
      - name: Tier 3 — components + smoke (headless Chromium)
        run: npm run test:browser
