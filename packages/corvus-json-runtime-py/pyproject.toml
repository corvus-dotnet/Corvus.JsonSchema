[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "corvus-json-runtime"
version = "0.1.0"
description = "Runtime for Corvus JSON Schema generated Python models: exact-number validation, temporal conversions, JSON patch, and the evaluate/parse/build core."
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
authors = [{ name = "Endjin Limited" }]
dependencies = ["whenever>=0.6", "regex>=2024.0", "idna>=3.0"]

[project.optional-dependencies]
dev = ["mypy", "pyright", "types-regex", "ruff"]

[project.urls]
Homepage = "https://corvus.text.json.dev"

[tool.hatch.build.targets.wheel]
packages = ["src/corvus_json_runtime"]

[tool.mypy]
strict = true

[tool.ruff]
line-length = 120