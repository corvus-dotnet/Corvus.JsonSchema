<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>JSON Logic Playground — Corvus.Text.Json</title>
    <base href="/Corvus.JsonSchema/pr-preview/pr-740/playground-jsonlogic/" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="css/app.css" />

    <!-- Anti-flash: apply saved theme before first paint -->
    <script>
        (function () {
            var saved = 'dark';
            try { saved = localStorage.getItem('jsonlogic-theme') || 'dark'; } catch (e) { }
            var resolved = saved;
            if (saved === 'auto') {
                resolved = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
            }
            document.documentElement.setAttribute('data-theme', resolved);
            window.__playgroundResolvedTheme = resolved;
        })();
    </script>
</head>
<body>
    <div id="app">
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:var(--bg-primary);color:var(--text-primary)">
            <div style="margin-bottom:1rem;font-size:1.25rem;font-weight:600">Loading JSON Logic Playground…</div>
            <div style="width:200px;height:4px;background:var(--bg-tertiary);border-radius:2px;overflow:hidden">
                <div id="load-progress" style="width:0%;height:100%;background:var(--accent);transition:width 0.3s"></div>
            </div>
            <div id="load-status" style="margin-top:0.5rem;font-size:0.85rem;opacity:0.7"></div>
        </div>
    </div>

    <!-- Google Blockly v12.5.1 (self-hosted, loaded BEFORE Monaco's AMD
         loader so the global define() doesn't exist yet — no conflict) -->
    <script src="js/blockly/blockly_compressed.js"></script>
    <script src="js/blockly/blocks_compressed.js"></script>
    <script src="js/blockly/msg/en.js"></script>
    <script src="js/blockly-jsonlogic.js"></script>

    <!-- Monaco Editor via BlazorMonaco (must load BEFORE jsInterop.js) -->
    <script src="_content/BlazorMonaco/lib/monaco-editor/min/vs/loader.js"></script>
    <script>
        require.config({ paths: { 'vs': '_content/BlazorMonaco/lib/monaco-editor/min/vs' } });
        window.monacoReady = new Promise(function (resolve) {
            require(['vs/editor/editor.main'], resolve);
        });
    </script>
    <script src="_content/BlazorMonaco/jsInterop.js"></script>
    <script src="js/playground-interop.js"></script>

    <!-- Delay Blazor start until Monaco is fully loaded;
         BlazorMonaco silently fails if monaco is undefined. -->
    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script>
        window.monacoReady.then(function () {
            var loaded = 0;
            var total = 0;
            var progressEl = document.getElementById('load-progress');
            var statusEl = document.getElementById('load-status');

            function updateProgress() {
                loaded++;
                var pct = total > 0 ? Math.round(100 * loaded / total) : 0;
                if (progressEl) { progressEl.style.width = pct + '%'; }
                if (statusEl) { statusEl.textContent = loaded + ' / ' + total + ' resources'; }
            }

            Blazor.start({
                loadBootResource: function (type, name, defaultUri, integrity) {
                    // Only intercept assembly and dotnetwasm resources;
                    // dotnetjs and other types must return null (URI string required).
                    if (type !== 'assembly' && type !== 'dotnetwasm') {
                        return null;
                    }

                    total++;
                    if (statusEl) {
                        var displayName = name.replace(/\.[a-z0-9]{8,12}\.(dll|wasm)$/, '.$1');
                        statusEl.textContent = 'Loading ' + displayName + '\u2026';
                    }

                    var fetchOpts = { cache: 'default' };
                    if (integrity) fetchOpts.integrity = integrity;

                    return fetch(defaultUri, fetchOpts).then(function (r) {
                        return r.arrayBuffer().then(function (buf) {
                            updateProgress();
                            return new Response(buf, {
                                status: r.status,
                                statusText: r.statusText,
                                headers: r.headers
                            });
                        });
                    });
                }
            });
        });
    </script>
</body>
</html>
