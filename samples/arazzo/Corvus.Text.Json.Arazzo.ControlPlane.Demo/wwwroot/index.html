<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Arazzo Control Plane</title>
  <link rel="stylesheet" href="/ui/src/arazzo-kit.css">
  <style>
    body { font-family: var(--arazzo-font); color: var(--arazzo-text); background: var(--arazzo-bg); margin: 0; }
    .page { max-width: 1100px; margin: 0 auto; padding: 24px 20px 48px; }
    header.top { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 4px; }
    h1 { font-size: 20px; margin: 0; }
    .sub { color: var(--arazzo-muted); font-size: 13px; }
    .topbar-right { margin-left: auto; display: inline-flex; gap: 10px; align-items: center; }
    /* Tri-state theme toggle: a single button cycling System → Light → Dark, showing the current mode's icon. */
    .theme-toggle { display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px; padding: 0; border: 1px solid var(--arazzo-border); border-radius: 6px; background: var(--arazzo-surface); color: var(--arazzo-text); cursor: pointer; }
    .theme-toggle:hover { border-color: var(--arazzo-accent); color: var(--arazzo-accent); }
    .theme-toggle:focus-visible { outline: 2px solid var(--arazzo-accent); outline-offset: 2px; }
    .theme-toggle svg { display: block; width: 16px; height: 16px; }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid var(--arazzo-border); }
    .tabs button { font: inherit; font-size: 14px; cursor: pointer; border: none; background: none; color: var(--arazzo-muted); padding: 8px 14px; border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .tabs button[aria-selected="true"] { color: var(--arazzo-text); border-bottom-color: var(--arazzo-accent); font-weight: 600; }
    .authbar { display: inline-flex; gap: 10px; align-items: center; font-size: 13px; }
    .linklike { font: inherit; font-size: 13px; cursor: pointer; border: none; background: none; padding: 0; color: var(--arazzo-accent); text-decoration: underline; }
    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <div class="page">
    <header class="top">
      <h1>Arazzo Control Plane</h1>
      <div class="topbar-right">
        <div id="auth" class="authbar" hidden></div>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Theme"></button>
      </div>
    </header>

    <div class="tabs" role="tablist">
      <button id="tab-runs" role="tab" aria-selected="true" aria-controls="view-runs">Runs</button>
      <button id="tab-catalog" role="tab" aria-selected="false" aria-controls="view-catalog">Catalog</button>
      <button id="tab-access" role="tab" aria-selected="false" aria-controls="view-access">Access</button>
    </div>

    <div id="view-runs" role="tabpanel">
      <arazzo-control-plane base-url="/arazzo/v1" scopes="runs:read runs:write runs:purge" theme="auto" poll="4000"></arazzo-control-plane>
    </div>

    <div id="view-catalog" role="tabpanel" hidden>
      <arazzo-catalog base-url="/arazzo/v1" scopes="catalog:read catalog:write catalog:purge" theme="auto"></arazzo-catalog>
    </div>

    <div id="view-access" role="tabpanel" hidden>
      <arazzo-access-requests base-url="/arazzo/v1" theme="auto"></arazzo-access-requests>
    </div>
  </div>

  <script type="module">
    import '/ui/src/arazzo-control-plane.js';
    import '/ui/src/arazzo-catalog.js';
    import '/ui/src/components/access-requests-panel.js';

    const panel = document.querySelector('arazzo-control-plane');
    const catalog = document.querySelector('arazzo-catalog');
    const access = document.querySelector('arazzo-access-requests');

    // BFF auth (§16.3). When the host runs with authorization on, an API 401 means "not signed in" — bounce the
    // browser to /login (the OIDC challenge). When the host runs open (the default), the API returns 200 and
    // /me is absent (404), so this is inert and the sign-in bar stays hidden. The cookie travels same-origin.
    const loginUrl = () => '/login?returnUrl=' + encodeURIComponent(location.pathname + location.search);
    const authFetch = async (input, init = {}) => {
      // X-CSRF anti-forgery (§16.3): the server requires this header on cookie-authenticated state-changing
      // calls; sending it on every request is harmless and forces a CORS preflight that isolates cross-origin.
      const headers = new Headers(init.headers || {});
      headers.set('X-CSRF', '1');
      const res = await fetch(input, { credentials: 'include', ...init, headers });
      if (res.status === 401) { location.assign(loginUrl()); return new Promise(() => {}); }
      return res;
    };
    panel.fetch = authFetch;
    catalog.fetch = authFetch;
    access.fetch = authFetch;

    // Sign-in bar: show who is signed in (from /me) with a sign-out, or a sign-in link; hidden when auth is off.
    const authEl = document.getElementById('auth');
    (async () => {
      let me;
      try {
        const r = await fetch('/me', { credentials: 'include' });
        if (r.status === 404) return;                 // authorization disabled — no BFF endpoints
        me = r.ok ? await r.json() : null;
      } catch { return; }
      authEl.hidden = false;
      if (me) {
        const who = document.createElement('span');
        who.className = 'sub';
        who.textContent = 'Signed in as ' + me.name + (me.groups?.length ? ' (' + me.groups.join(', ') + ')' : '');
        const out = document.createElement('button');
        out.className = 'linklike';
        out.textContent = 'Sign out';
        out.addEventListener('click', () => {
          const f = document.createElement('form'); f.method = 'post'; f.action = '/logout';
          document.body.appendChild(f); f.submit();   // POST navigation so the OIDC sign-out redirect chain runs
        });
        authEl.replaceChildren(who, out);
      } else {
        const a = document.createElement('a');
        a.className = 'linklike';
        a.href = loginUrl();
        a.textContent = 'Sign in';
        authEl.replaceChildren(a);
      }
    })();

    // Tri-state theme toggle: one title-bar button cycling System → Light → Dark, showing the current mode's icon.
    // Theme drives the panels (their `theme` attribute) and the page (arazzo-kit.css honours data-theme on <html>);
    // 'auto' clears data-theme so the kit follows the OS preference. The choice persists across reloads.
    const THEME_ORDER = ['auto', 'light', 'dark'];
    const THEME_META = {
      auto: { label: 'System', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="14" rx="2"/><path d="M8 21h8M12 18v3"/></svg>' },
      light: { label: 'Light', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>' },
      dark: { label: 'Dark', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>' },
    };
    const themeToggle = document.getElementById('theme-toggle');
    const applyTheme = (v) => {
      panel.setAttribute('theme', v);
      catalog.setAttribute('theme', v);
      access.setAttribute('theme', v);
      if (v === 'auto') document.documentElement.removeAttribute('data-theme');
      else document.documentElement.setAttribute('data-theme', v);
      const meta = THEME_META[v];
      themeToggle.innerHTML = meta.icon;
      themeToggle.setAttribute('aria-label', `Theme: ${meta.label} (click to change)`);
      themeToggle.title = `Theme: ${meta.label} — click to switch`;
    };
    let theme = localStorage.getItem('arazzo-theme');
    if (!THEME_ORDER.includes(theme)) { theme = 'auto'; }
    applyTheme(theme);
    themeToggle.addEventListener('click', () => {
      theme = THEME_ORDER[(THEME_ORDER.indexOf(theme) + 1) % THEME_ORDER.length];
      localStorage.setItem('arazzo-theme', theme);
      applyTheme(theme);
    });

    // Tabs.
    const tabs = { runs: document.getElementById('tab-runs'), catalog: document.getElementById('tab-catalog'), access: document.getElementById('tab-access') };
    const views = { runs: document.getElementById('view-runs'), catalog: document.getElementById('view-catalog'), access: document.getElementById('view-access') };
    const selectTab = (name) => {
      for (const key of Object.keys(tabs)) {
        tabs[key].setAttribute('aria-selected', String(key === name));
        views[key].hidden = key !== name;
      }
    };
    tabs.runs.addEventListener('click', () => selectTab('runs'));
    tabs.catalog.addEventListener('click', () => selectTab('catalog'));
    tabs.access.addEventListener('click', () => selectTab('access'));
  </script>
</body>
</html>
