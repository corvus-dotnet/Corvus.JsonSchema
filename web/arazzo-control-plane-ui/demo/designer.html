<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Arazzo Workflow Designer — design-surface spike</title>
  <link rel="icon" href="./favicon.svg">
  <link rel="stylesheet" href="../src/arazzo-kit.css">
  <style>
    body { margin: 0; font: 14px var(--arazzo-font, system-ui, sans-serif); background: var(--arazzo-bg, #fff); color: var(--arazzo-text, #1c2024); }
    header { display: flex; gap: 10px; align-items: center; padding: 10px 14px; border-bottom: 1px solid var(--arazzo-border, #e3e6ea); flex-wrap: wrap; }
    header h1 { font-size: 15px; margin: 0 12px 0 0; }
    header .spacer { flex: 1; }
    main { display: grid; grid-template-columns: 1fr 360px; gap: 12px; padding: 12px 14px; height: calc(100vh - 100px); box-sizing: border-box; }
    arazzo-design-surface { height: 100%; }
    aside { display: flex; flex-direction: column; gap: 10px; min-width: 0; }
    aside section { border: 1px solid var(--arazzo-border, #e3e6ea); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; min-width: 0; }
    #inspector, #inspector > * { min-width: 0; }
    aside h2 { font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--arazzo-muted, #6b7280); margin: 0; padding: 8px 10px; border-bottom: 1px solid var(--arazzo-border, #e3e6ea); }
    aside pre { margin: 0; padding: 10px; font: 11px ui-monospace, Menlo, monospace; overflow: auto; flex: 1; min-height: 0; }
    #log { max-height: 40vh; }
    button, select { font: inherit; padding: 5px 10px; border: 1px solid var(--arazzo-border, #e3e6ea); border-radius: 8px; background: var(--arazzo-bg, #fff); color: inherit; cursor: pointer; }
    label.chk { display: inline-flex; gap: 6px; align-items: center; }
  </style>
</head>
<body>
  <header>
    <h1>Design-surface spike</h1>
    <select id="workflow"></select>
    <button id="fit">Fit</button>
    <button id="relayout">Auto-layout</button>
    <button id="simulate">▶ Simulate (canned trace)</button>
    <button id="step">⏭ Step</button>
    <button id="stop" hidden>■ Stop</button>
    <label class="chk"><input type="checkbox" id="readonly"> read-only</label>
    <span class="spacer"></span>
    <button id="theme">Toggle theme</button>
  </header>
  <main>
    <arazzo-design-surface id="surface"></arazzo-design-surface>
    <aside>
      <section>
        <h2>Selection</h2>
        <div id="inspector" style="padding: 10px; display: grid; gap: 8px;"></div>
        <pre id="selection">(nothing selected)</pre>
      </section>
      <section>
        <h2>Expression console (CM6)</h2>
        <div style="padding: 10px;">
          <arazzo-expression-input id="expr" placeholder="$steps.authorize-payment.outputs.…"></arazzo-expression-input>
          <div style="font-size: 11px; color: var(--arazzo-muted, #6b7280); margin-top: 6px;">
            Completions from the fixture schema — try <code>$st</code> then <code>.</code>
          </div>
        </div>
      </section>
      <section>
        <h2>Events</h2>
        <pre id="log"></pre>
      </section>
    </aside>
  </main>

  <script type="module">
    import { designerFixture } from './designer-fixture.js';
    import { projectWorkflow, listWorkflows } from '../src/workflow-graph.js';
    import { EXPRESSION_ROOTS } from '../src/expression-language.js';
    import '../src/components/design-surface.js';
    import '../src/components/expression-input.js';
    import '../src/components/criteria-editor.js';
    import '../src/components/action-editor.js';
    import '../src/components/step-inspector.js';
    import '../src/components/workflow-inspector.js';

    const surface = document.getElementById('surface');
    const select = document.getElementById('workflow');
    const selectionPre = document.getElementById('selection');
    const log = document.getElementById('log');

    // The demo owns a mutable copy of the fixture so edge-created can round-trip into the document.
    const doc = structuredClone(designerFixture);

    for (const w of listWorkflows(doc)) {
      const opt = document.createElement('option');
      opt.value = w.workflowId;
      opt.textContent = w.workflowId;
      select.append(opt);
    }

    function project() {
      surface.graph = projectWorkflow(doc, select.value);
    }
    select.addEventListener('change', () => { project(); surface.fit(); });
    select.value = 'place-order';
    project();

    const logEvent = (type, detail) => {
      log.textContent = `${type} ${JSON.stringify(detail)}\n${log.textContent}`.slice(0, 4000);
    };
    for (const type of ['selection-changed', 'layout-changed', 'edge-created', 'breakpoint-toggled', 'node-activated', 'delete-requested']) {
      surface.addEventListener(type, (e) => logEvent(type, e.detail));
    }

    // The inspector: selection drives a real editor with write-back into the document — the
    // drop → select → conditions flow. Edits re-project with positions preserved and never
    // rebuild the editor mid-typing (only a selection change does).
    const inspector = document.getElementById('inspector');
    const heading = (text) => {
      const h = document.createElement('div');
      h.style.cssText = 'font-size:11px; color: var(--arazzo-muted, #6b7280); font-weight:600;';
      h.textContent = text;
      return h;
    };
    function reproject(keepSelection) {
      surface.layoutOverrides = surface.positions;
      project();
      if (keepSelection) surface.selection = keepSelection;
    }
    surface.addEventListener('selection-changed', (e) => showSelection(e.detail.selection));
    function showSelection(sel) {
      inspector.replaceChildren();
      selectionPre.textContent = '';
      if (!sel) { selectionPre.textContent = '(nothing selected)'; return; }
      const wf = doc.workflows.find((w) => w.workflowId === select.value);

      // Start / end / background / defaults all land on the workflow inspector, focused per §6.2.
      const workflowSection = sel.type === 'node' && sel.id === '#start' ? 'inputs'
        : sel.type === 'node' && sel.id === '#end' ? 'outputs'
        : sel.type === 'defaults' ? 'failure'
        : null;
      if (workflowSection !== null || sel.type === 'defaults') {
        const wi = doc.workflows.indexOf(wf);
        const ed = document.createElement('arazzo-workflow-inspector');
        ed.stepIds = wf.steps.map((s) => s.stepId);
        ed.completionContext = expr.completionContext;
        ed.value = wf;
        if (workflowSection) ed.setAttribute('focus-section', workflowSection);
        inspector.append(heading(`workflow — ${wf.workflowId}`), ed);
        ed.addEventListener('workflow-changed', (ev) => {
          doc.workflows[wi] = ev.detail.workflow;
          reproject(sel);
        });
        return;
      }
      if (sel.type === 'node') {
        const si = wf.steps.findIndex((s) => s.stepId === sel.id);
        const ed = document.createElement('arazzo-step-inspector');
        ed.stepIds = wf.steps.map((s) => s.stepId);
        ed.workflowIds = doc.workflows.map((w) => w.workflowId).filter((id) => id !== wf.workflowId);
        ed.workflowDefaults = { successActions: wf.successActions || [], failureActions: wf.failureActions || [] };
        ed.completionContext = expr.completionContext;
        ed.value = wf.steps[si];
        inspector.append(heading(`step — ${sel.id}`), ed);
        ed.addEventListener('step-changed', (ev) => {
          wf.steps[si] = ev.detail.step;
          reproject(sel);
        });
        return;
      }
      if (sel.type === 'edge') {
        const edge = surface.graph.edges.find((x) => x.id === sel.id);
        if (!edge || edge.kind === 'seq') {
          selectionPre.textContent = 'implicit sequence edge — document order, not an action';
          return;
        }
        if (edge.reusable) {
          selectionPre.textContent = 'reusable action ($components reference) — edit it in the components library';
          return;
        }
        const step = wf.steps.find((s) => s.stepId === edge.from);
        const list = edge.kind === 'success' ? 'onSuccess' : 'onFailure';
        const idx = (step?.[list] || []).findIndex((a) => a && a.name === edge.actionName);
        if (idx < 0) { selectionPre.textContent = '(action not found)'; return; }
        const ed = document.createElement('arazzo-action-editor');
        ed.kind = edge.kind;
        ed.stepIds = wf.steps.map((s) => s.stepId).filter((id) => id !== edge.from);
        ed.completionContext = expr.completionContext;
        ed.value = step[list][idx];
        inspector.append(heading(`${edge.from} · ${list}[${idx}]`), ed);
        ed.addEventListener('action-changed', (ev) => {
          step[list][idx] = ev.detail.action;
          reproject(null);
          const renamed = surface.graph.edges.find((x) =>
            x.from === edge.from && x.kind === edge.kind && x.actionName === ev.detail.action.name);
          if (renamed) surface.selection = { type: 'edge', id: renamed.id };
        });
        return;
      }
      selectionPre.textContent = JSON.stringify(sel, null, 2);
    }

    // Round-trip: drawing an edge writes a goto action — or, dropped on the end terminal, an
    // end action — into the document, re-projects, and SELECTS the new edge (the designer's
    // drop → select → edit-criteria flow; the inspector will open on the action's conditions).
    // An identical unconditional duplicate is meaningless, so it selects the existing edge instead.
    surface.addEventListener('edge-created', (e) => {
      const { from, to, kind } = e.detail;
      const wf = doc.workflows.find((w) => w.workflowId === select.value);
      const step = wf.steps.find((s) => s.stepId === from);
      const list = kind === 'success' ? 'onSuccess' : 'onFailure';
      const actions = step[list] || [];

      const existing = surface.graph.edges.find((x) =>
        x.from === from && x.to === to && x.kind === kind && !x.criteriaSummary);
      if (existing) {
        surface.selection = { type: 'edge', id: existing.id };
        logEvent('edge-exists', { id: existing.id, note: 'identical unconditional edge — selected it instead' });
        return;
      }

      const baseName = to === '#end' ? `end-on-${kind}` : `goto-${to}`;
      let name = baseName;
      for (let n = 2; actions.some((a) => a.name === name); n++) name = `${baseName}-${n}`;
      const action = to === '#end'
        ? { name, type: 'end' }
        : { name, type: 'goto', stepId: to };
      step[list] = [...actions, action];
      surface.layoutOverrides = surface.positions; // keep the canvas stable across the re-projection
      project();
      const created = surface.graph.edges.find((x) => x.from === from && x.actionName === name);
      if (created) surface.selection = { type: 'edge', id: created.id };
    });

    // A canned debug-session trace: the declined-payment path into manual review.
    const trace = [
      { active: 'validate-order', steps: {}, edges: ['seq:#start'] },
      { active: 'authorize-payment', steps: { 'validate-order': 'done-success' }, edges: ['seq:#start', 'seq:validate-order'] },
      { active: 'authorize-payment', steps: { 'validate-order': 'done-success' }, edges: ['seq:#start', 'seq:validate-order'] }, // retry ↻
      { active: 'manual-review',
        steps: { 'validate-order': 'done-success', 'authorize-payment': 'done-failure', 'await-confirmation': 'skipped', 'capture-payment': 'skipped' },
        edges: ['seq:#start', 'seq:validate-order', 'goto:authorize-payment:manual-review-on-decline:failure'] },
      { active: null,
        steps: { 'validate-order': 'done-success', 'authorize-payment': 'done-failure', 'await-confirmation': 'skipped', 'capture-payment': 'skipped', 'manual-review': 'done-success', '#end': 'done-success' },
        edges: ['seq:#start', 'seq:validate-order', 'goto:authorize-payment:manual-review-on-decline:failure', 'end:manual-review:halt-after-review:success'] },
    ];
    // A tiny trace player standing in for the real replay-based debug session (design §8.2/§3.3):
    // run → the button becomes Pause (halts before the next step); breakpoints pause on entry;
    // Resume continues; Stop terminates the session and clears the overlay.
    const simBtn = document.getElementById('simulate');
    const stepBtn = document.getElementById('step');
    const stopBtn = document.getElementById('stop');
    const SIM_LABEL = '▶ Simulate (canned trace)';
    let player = null; // { i, timer, paused }

    function setUi() {
      // States: idle (null) · running · paused · done ({done:true} — overlay kept for inspection).
      stopBtn.hidden = !player;
      stopBtn.textContent = player?.done ? '✕ Clear' : '■ Stop';
      stepBtn.hidden = !!player && !player.paused && !player.done;
      simBtn.textContent = !player || player.done
        ? SIM_LABEL
        : player.paused
          ? `⏵ Resume (paused at ${trace[player.i].active ?? 'end'})`
          : '⏸ Pause';
    }
    function pausePlayer(detail) {
      if (!player || player.paused) return;
      clearInterval(player.timer);
      player.timer = null;
      player.paused = true;
      logEvent('debug-paused', detail);
      setUi();
    }
    function applyFrame() {
      const frame = trace[player.i];
      surface.debugState = frame;
      const entered = frame.active && frame.active !== trace[player.i - 1]?.active;
      if (entered && surface.breakpoints.has(frame.active)) {
        pausePlayer({ stepId: frame.active, note: 'breakpoint hit' });
      }
    }
    function tick() {
      player.i++;
      if (player.i >= trace.length) {
        clearInterval(player.timer);
        player = { done: true }; // keep the outcome overlay; ✕ Clear returns to the clean surface
        logEvent('debug-finished', { note: 'overlay kept for inspection — Clear to reset' });
        setUi();
        return;
      }
      applyFrame();
    }
    simBtn.addEventListener('click', () => {
      if (player?.done) player = null; // a finished run restarts cleanly
      if (player && !player.paused) {
        pausePlayer({ note: 'paused by user — before the next step' });
        return;
      }
      if (player?.paused) {
        player.paused = false;
        logEvent('debug-resumed', {});
        setUi();
        player.timer = setInterval(tick, 900);
        return;
      }
      select.value = 'place-order';
      project();
      player = { i: 0, timer: null, paused: false };
      logEvent('simulate', { scenario: 'payment-declined → manual review' });
      applyFrame(); // frame 0 can itself hit a breakpoint
      setUi();
      if (player && !player.paused) player.timer = setInterval(tick, 900);
    });
    stepBtn.addEventListener('click', () => {
      if (player?.done) player = null; // stepping after a finished run starts a fresh session
      if (!player) {
        // From idle: start the session paused before the first step.
        select.value = 'place-order';
        project();
        player = { i: 0, timer: null, paused: true };
        surface.debugState = trace[0];
        logEvent('debug-step', { at: trace[0].active, note: 'session started paused' });
        setUi();
        return;
      }
      if (!player.paused) return;
      // Execute exactly the next step, then stay paused (no breakpoint check — already stepping).
      player.i++;
      if (player.i >= trace.length) {
        player = { done: true };
        logEvent('debug-finished', { note: 'overlay kept for inspection — Clear to reset' });
        setUi();
        return;
      }
      surface.debugState = trace[player.i];
      logEvent('debug-step', { at: trace[player.i].active ?? 'end' });
      setUi();
    });
    stopBtn.addEventListener('click', () => {
      if (player?.timer) clearInterval(player.timer);
      player = null;
      surface.debugState = null;
      logEvent('debug-stopped', {});
      setUi();
    });

    // Expression console: completions from the fixture's schema surface, validation of $roots.
    const expr = document.getElementById('expr');
    const wf = designerFixture.workflows[0];
    expr.completionContext = {
      inputs: wf.inputs, // a JSON Schema: names + type details, pointer descent below
      outputs: Object.keys(wf.outputs || {}),
      steps: Object.fromEntries(wf.steps.map((s) => [s.stepId, {
        outputs: Object.keys(s.outputs || {}),
        summary: s.description,
      }])),
      // In the real designer these come from the selected step's operation via the baked schemas;
      // the demo stands in with the authorize-payment shapes so `$response.body#/…` completes.
      response: {
        body: {
          type: 'object',
          properties: {
            status: { type: 'string' },
            authorizationId: { type: 'string' },
            card: { type: 'object', properties: { last4: { type: 'string' }, brand: { type: 'string' } } },
            receipt: { type: 'object', properties: { id: { type: 'string' }, total: { type: 'number' } } },
          },
        },
      },
      message: {
        payload: {
          type: 'object',
          properties: { confirmed: { type: 'boolean' }, at: { type: 'string', format: 'date-time' } },
        },
      },
    };
    expr.validator = async (value) => {
      const bad = [...value.matchAll(/\$[A-Za-z_][A-Za-z0-9_]*/g)]
        .map((m) => m[0])
        .filter((root) => !EXPRESSION_ROOTS.includes(root));
      return bad.length
        ? { valid: false, errors: bad.map((b) => ({ message: `unknown root '${b}'` })) }
        : { valid: true };
    };
    expr.addEventListener('commit', (e) => logEvent('expression-commit', e.detail));

    document.getElementById('fit').addEventListener('click', () => surface.fit());
    document.getElementById('relayout').addEventListener('click', () => { surface.layoutOverrides = {}; surface.fit(); });
    document.getElementById('readonly').addEventListener('change', (e) => {
      surface.toggleAttribute('readonly', e.target.checked);
    });
    document.getElementById('theme').addEventListener('click', () => {
      const html = document.documentElement;
      html.dataset.theme = html.dataset.theme === 'dark' ? 'light' : 'dark';
    });
  </script>
</body>
</html>
